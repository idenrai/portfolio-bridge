  - pattern: "src/utils/gurus.ts"
    doc: "doc/pages/gurus.md"

  - pattern: "src/utils/analyzers/**"
    doc: "doc/pages/gurus.md"

  - pattern: "src/hooks/useAnalyzer.ts"
    doc: "doc/pages/gurus.md"

  - pattern: "src/stores/useGuruSessionStore.ts"
    doc: "doc/pages/gurus.md"

  - pattern: "src/hooks/useBuffettIndicator.ts"
    doc: "doc/pages/gurus.md"

  # ── Settings & Profile ─────────────────────────────────────────────────────
  - pattern: "src/pages/Settings.tsx"
