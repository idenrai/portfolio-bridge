  - pattern: "src/components/settings/**"
    doc: "doc/pages/settings.md"

  - pattern: "src/stores/useSettingsStore.ts"
    doc: "doc/pages/settings.md"

  - pattern: "src/stores/useProfileStore.ts"
    doc: "doc/pages/settings.md"

  - pattern: "src/stores/useGoogleDriveStore.ts"
    doc: "doc/pages/settings.md"

  - pattern: "src/hooks/useGoogleDrive.ts"
    doc: "doc/pages/settings.md"

  - pattern: "src/hooks/useExchangeRates.ts"
