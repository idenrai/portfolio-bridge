  # ── AI Prompts ─────────────────────────────────────────────────────────────
  - pattern: "src/utils/ai/**"
    doc: "doc/features/ai-prompts.md"

  # ── i18n ───────────────────────────────────────────────────────────────────
  - pattern: "src/i18n/**"
    doc: "doc/features/i18n.md"

  - pattern: "src/hooks/useT.ts"
