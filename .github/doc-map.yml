# Feature → Design Document Mapping
#
# PURPOSE
# -------
# Maps source file patterns to their corresponding design documentation files.
# After modifying any file that matches a pattern below, the corresponding
# doc file MUST be updated to reflect the change before committing.
#
# HOW TO USE
# ----------
# 1. Find all entries whose `pattern` matches a file you modified.
# 2. Open each matched `doc` file and update the relevant section.
# 3. If no pattern matches, update doc/overview.md.
#
# PATTERN RULES
# -------------
#   "src/pages/Foo.tsx"  → exact file
#   "src/dir/**"         → all files under a directory (recursive)
#
# DOC STRUCTURE
# -------------
#   doc/overview.md               App concept, routing, state management, privacy model
#   doc/pages/dashboard.md        Dashboard page spec
#   doc/pages/assets.md           Asset management page spec
#   doc/pages/gurus.md            Gurus page + quantitative analyzers
#   doc/pages/settings.md         Settings page + user profile
#   doc/features/ai-prompts.md    AI prompt system (buildGuruPrompt, etc.)
#   doc/features/i18n.md          i18n system + translation guide
#   doc/system/yahoo-finance.md   Yahoo Finance integration
#   doc/system/tauri.md           Tauri desktop app

mappings:

  # ── Dashboard ──────────────────────────────────────────────────────────────
  - pattern: "src/pages/Dashboard.tsx"
    doc: "doc/pages/dashboard.md"

  - pattern: "src/components/dashboard/**"
    doc: "doc/pages/dashboard.md"

  - pattern: "src/hooks/usePortfolio.ts"
    doc: "doc/pages/dashboard.md"

  - pattern: "src/utils/sampleData.ts"
    doc: "doc/pages/dashboard.md"

  # ── Asset Management ───────────────────────────────────────────────────────
  - pattern: "src/pages/Assets.tsx"
    doc: "doc/pages/assets.md"

  - pattern: "src/components/assets/**"
    doc: "doc/pages/assets.md"

  - pattern: "src/stores/useAssetStore.ts"
    doc: "doc/pages/assets.md"

  - pattern: "src/stores/useBrokerStore.ts"
    doc: "doc/pages/assets.md"

  - pattern: "src/utils/csv.ts"
    doc: "doc/pages/assets.md"

  # ── Investment Gurus ───────────────────────────────────────────────────────
