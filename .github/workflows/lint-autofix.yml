name: Lint Autofix

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (defaults to the branch this workflow is on)"
        required: false
        default: ""

# Write permission needed to commit the fix back to the branch
permissions:
  contents: write

jobs:
  lint-fix:
    name: ESLint --fix & Commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Use PAT or default token; ref is empty = current branch
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint --fix
        # `|| true` so the step doesn't fail if there are still unfixable errors
        run: npx eslint . --fix || true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "has_changes=false" >> "$GITHUB_OUTPUT" \
            || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # [skip ci] prevents an infinite loop when this commit triggers CI again
          git commit -m "fix: auto-fix ESLint errors [skip ci]"
          git push

      - name: No changes needed
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "✅ No ESLint errors could be auto-fixed. All clean!"
